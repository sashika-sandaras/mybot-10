name: Send Movie File (Test)
on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'වීඩියෝ එකේ ID එක (GDrive හෝ VOE)'
        required: true
        default: '1ky7izAvdu6gL73VTBT9l2hxG7wWVS1pZ4sk5QsrvHn8ZSaWiINYv6sniekwSpHk'
      user_jid:
        description: 'ඔයාගේ WhatsApp Number එක (උදා: 94766886046@s.whatsapp.net)'
        required: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # මෙතන 20 කළා, දැන් Error එක එන්නේ නැහැ
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          pip install requests
          npm install @whiskeysockets/baileys pino axios qrcode-terminal

      - name: Process and Send
        env:
          VOE_KEY: ${{ secrets.VOE_KEY }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          FILE_ID: ${{ github.event.inputs.file_id }}
          USER_JID: ${{ github.event.inputs.user_jid }}
        run: |
          python3 -c "
          import os, requests
          voe_key = os.getenv('VOE_KEY')
          file_id = os.getenv('FILE_ID')
          url = None
          if len(file_id) > 20:
              url = f'https://drive.google.com/uc?export=download&id={file_id}'
          else:
              try:
                  r = requests.get(f'https://voe.sx/api/drive/v2/file/info?key={voe_key}&file_code={file_id}')
                  url = r.json().get('result', {}).get('direct_url')
              except: pass
          
          if url:
              print(f'Downloading...')
              with requests.get(url, stream=True) as r:
                  with open('movie_mflix.mp4', 'wb') as f:
                      for chunk in r.iter_content(chunk_size=8192): f.write(chunk)
              print('Download Complete!')
          else:
              print('Error: URL not found')
          "
          node send.js
